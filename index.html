<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Experience Pro</title>

<style>
body {
  margin:0;
  overflow:hidden;
  background:radial-gradient(circle at center,#02040a,#000);
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  color:white;
}

/* UI CONTAINER */
#ui {
  position:fixed;
  top:30px;
  left:30px;
  z-index:10;
  transition:all 0.4s ease;
}

/* PREMIUM CARD */
.card {
  width:280px;
  padding:20px;
  border-radius:18px;

  background:linear-gradient(
    135deg,
    rgba(255,255,255,0.08),
    rgba(255,255,255,0.02)
  );

  backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,0.15);

  box-shadow:
    0 10px 40px rgba(0,0,0,0.6),
    inset 0 0 20px rgba(255,255,255,0.05);

  transition:all 0.4s ease;
}

/* TITLE */
#name {
  font-size:1.6rem;
  font-weight:600;
  letter-spacing:0.5px;
  margin-bottom:8px;
}

/* DESCRIPTION */
#desc {
  font-size:0.95rem;
  line-height:1.5;
  opacity:0.7;
}

/* PROGRESS BAR */
#progress {
  position:fixed;
  bottom:0;
  left:0;
  height:3px;
  background:linear-gradient(90deg,#00d4ff,#7b61ff);
  width:0%;
  z-index:20;
}

/* PLANET GLOW */
.planet-glow {
  position:absolute;
  width:400px;
  height:400px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(0,150,255,0.2),transparent);
  filter:blur(60px);
  pointer-events:none;
}

/* LOADER */
#loader {
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:100;
  font-size:1.4rem;
  letter-spacing:2px;
  opacity:0.9;
}
</style>
</head>

<body>

<div id="loader">🌌 Loading Experience...</div>

<div id="ui">
  <div class="card">
    <h2 id="name">Space</h2>
    <p id="desc">Scroll to begin</p>
  </div>
</div>

<div id="progress"></div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js";

// SCENE
const scene = new THREE.Scene();

// CAMERA
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 3000);
camera.position.z = 10;

// RENDERER
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
document.body.appendChild(renderer.domElement);

// LIGHT
scene.add(new THREE.AmbientLight(0xffffff,0.6));
const light = new THREE.PointLight(0xffffff,1.5);
light.position.set(50,50,50);
scene.add(light);

// STARFIELD
const geo = new THREE.BufferGeometry();
let pos=[];
for(let i=0;i<2500;i++){
  pos.push((Math.random()-0.5)*3000);
  pos.push((Math.random()-0.5)*3000);
  pos.push((Math.random()-0.5)*3000);
}
geo.setAttribute("position", new THREE.Float32BufferAttribute(pos,3));
scene.add(new THREE.Points(geo,new THREE.PointsMaterial({color:0xffffff})));

// PLANETS
const loader = new THREE.TextureLoader();

function createPlanet(data){
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(2.5,32,32),
    new THREE.MeshStandardMaterial({color:data.color})
  );
  mesh.position.x = data.x;
  scene.add(mesh);
  return {...data, mesh, loaded:false};
}

const planets = [
  createPlanet({x:0,name:"🌍 Earth",desc:"Our home planet",tex:"https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/earth_atmos_2048.jpg",color:0x2266ff}),
  createPlanet({x:80,name:"🔴 Mars",desc:"The red planet",tex:"https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/mars_1k_color.jpg",color:0xff3300}),
  createPlanet({x:160,name:"🪐 Jupiter",desc:"Gas giant",tex:"https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/jupiter.jpg",color:0xffaa66})
];

// SCROLL
let target=0,current=0;

window.addEventListener("wheel", e=>{
  target += e.deltaY * 0.15;
});

// TOUCH
let lastY=0;
window.addEventListener("touchstart", e=>{
  lastY = e.touches[0].clientY;
});
window.addEventListener("touchmove", e=>{
  let delta = lastY - e.touches[0].clientY;
  target += delta * 0.1;
  lastY = e.touches[0].clientY;
});

// UI
const ui = document.getElementById("ui");
const progress = document.getElementById("progress");

// ANIMATION
function animate(){
  requestAnimationFrame(animate);

  current += (target-current)*0.05;
  camera.position.x = current;

  // PROGRESS BAR
  progress.style.width = Math.min(Math.max(current/200*100,0),100)+"%";

  planets.forEach(p=>{
    p.mesh.rotation.y += 0.002;

    // LAZY LOAD
    if(!p.loaded && Math.abs(camera.position.x - p.x) < 40){
      loader.load(p.tex, tex=>{
        p.mesh.material.map = tex;
        p.mesh.material.needsUpdate = true;
      });
      p.loaded = true;
    }
  });

  // FOCUS EFFECT
  let closest = planets.reduce((a,b)=>{
    return Math.abs(b.x-camera.position.x) <
           Math.abs(a.x-camera.position.x)?b:a;
  });

  let dist = Math.abs(closest.x - camera.position.x);

  // SLOW DOWN NEAR PLANET (cinematic feel)
  if(dist < 10){
    target += (closest.x - target) * 0.02;
  }

  // UI FADE
  ui.style.opacity = 0.2 + (1 - Math.min(dist/50,1));

 const nameEl = document.getElementById("name");
const descEl = document.getElementById("desc");

// SMOOTH TEXT TRANSITION
if(nameEl.innerText !== closest.name){
  nameEl.style.opacity = 0;
  descEl.style.opacity = 0;

  setTimeout(()=>{
    nameEl.innerText = closest.name;
    descEl.innerText = closest.desc;

    nameEl.style.opacity = 1;
    descEl.style.opacity = 0.7;
  },200);
}

  renderer.render(scene,camera);
}
animate();

// LOADER
setTimeout(()=>{
  document.getElementById("loader").style.display="none";
},1200);

// RESIZE
window.addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
  planets.forEach(p=>{
  let dist = Math.abs(camera.position.x - p.x);

  let scale = dist < 20 ? 1.4 : 1;
  p.mesh.scale.set(scale,scale,scale);
});
</script>

</body>
</html>
