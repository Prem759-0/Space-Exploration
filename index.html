<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space App</title>

<style>
body { margin:0; overflow:hidden; background:black; color:white; font-family:sans-serif; }

#ui {
  position:fixed;
  top:20px;
  left:20px;
  z-index:10;
}

.card {
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
  padding:15px;
  border-radius:10px;
  width:280px;
}

#apod img {
  width:100%;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<div id="ui">
  <div class="card">
    <h2>🌌 Space Explorer</h2>
    <p>Drag / touch to explore</p>
    <div id="apod">Loading NASA data...</div>
  </div>
</div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js";

// SCENE
const scene = new THREE.Scene();

// CAMERA
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 2000);
camera.position.z = 50;

// RENDERER
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
const light = new THREE.PointLight(0xffffff, 2);
scene.add(light);

// SUN
const sun = new THREE.Mesh(
  new THREE.SphereGeometry(5,64,64),
  new THREE.MeshBasicMaterial({color:0xffcc00})
);
scene.add(sun);

// PLANETS DATA
const loader = new THREE.TextureLoader();

const planets = [
  {dist:10, size:1, speed:0.02, color:0xaaaaaa},
  {dist:15, size:1.2, speed:0.015, color:0xffcc99},
  {dist:20, size:1.3, speed:0.01, tex:"https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/earth_atmos_2048.jpg"},
  {dist:25, size:1, speed:0.008, color:0xff3300},
];

planets.forEach(p=>{
  let mat = p.tex
    ? new THREE.MeshStandardMaterial({map:loader.load(p.tex)})
    : new THREE.MeshStandardMaterial({color:p.color});

  p.mesh = new THREE.Mesh(
    new THREE.SphereGeometry(p.size,32,32),
    mat
  );
  scene.add(p.mesh);
});

// ORBIT
function animate(){
  requestAnimationFrame(animate);

  planets.forEach((p,i)=>{
    let angle = Date.now() * p.speed * 0.001;
    p.mesh.position.x = Math.cos(angle) * p.dist;
    p.mesh.position.z = Math.sin(angle) * p.dist;
  });

  renderer.render(scene,camera);
}
animate();

// TOUCH CONTROLS
let isDragging=false, prevX=0;

window.addEventListener("mousedown", e=>{
  isDragging=true; prevX=e.clientX;
});
window.addEventListener("mouseup", ()=> isDragging=false);
window.addEventListener("mousemove", e=>{
  if(isDragging){
    let dx=e.clientX-prevX;
    camera.position.x += dx * 0.1;
    prevX=e.clientX;
  }
});

// MOBILE TOUCH
window.addEventListener("touchstart", e=>{
  prevX=e.touches[0].clientX;
});
window.addEventListener("touchmove", e=>{
  let dx=e.touches[0].clientX-prevX;
  camera.position.x += dx * 0.1;
  prevX=e.touches[0].clientX;
});

// NASA API
fetch("https://api.nasa.gov/planetary/apod?api_key=DEMO_KEY")
.then(res=>res.json())
.then(data=>{
  document.getElementById("apod").innerHTML =
    `<p>${data.title}</p><img src="${data.url}">`;
});

// RESIZE
window.addEventListener("resize", ()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
