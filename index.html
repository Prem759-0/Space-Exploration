<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Experience</title>

<style>
body { margin:0; font-family:sans-serif; background:black; color:white; overflow:hidden; }

/* LOADER */
#loader {
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:100;
  font-size:2rem;
  letter-spacing:3px;
}

/* NAV DOTS */
#nav {
  position:fixed;
  right:20px;
  top:50%;
  transform:translateY(-50%);
  z-index:20;
}
.dot {
  width:10px; height:10px;
  border-radius:50%;
  background:gray;
  margin:10px 0;
  transition:0.3s;
}
.dot.active { background:white; }

/* UI CARD */
#ui {
  position:fixed;
  top:20px;
  left:20px;
  z-index:10;
}
.card {
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(12px);
  padding:15px;
  border-radius:12px;
  width:260px;
}

/* CANVAS */
canvas { display:block; }
</style>
</head>

<body>

<div id="loader">🚀 Loading Universe...</div>

<div id="nav"></div>

<div id="ui">
  <div class="card">
    <h2 id="name">🌌 Space</h2>
    <p id="desc">Scroll to explore</p>
  </div>
</div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js";

// SCENE
const scene = new THREE.Scene();

// CAMERA
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 3000);
camera.position.z = 10;

// RENDERER
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

// LIGHT
scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const light = new THREE.PointLight(0xffffff, 1.5);
light.position.set(50,50,50);
scene.add(light);

// STARFIELD
const starGeo = new THREE.BufferGeometry();
let pos=[];
for(let i=0;i<3000;i++){
  pos.push((Math.random()-0.5)*3000);
  pos.push((Math.random()-0.5)*3000);
  pos.push((Math.random()-0.5)*3000);
}
starGeo.setAttribute("position", new THREE.Float32BufferAttribute(pos,3));
scene.add(new THREE.Points(starGeo,new THREE.PointsMaterial({color:0xffffff})));

// PLANETS
const loader = new THREE.TextureLoader();

function createPlanet(data){
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(2.5,32,32),
    new THREE.MeshStandardMaterial({color:data.color})
  );
  mesh.position.x = data.x;
  scene.add(mesh);
  return {...data, mesh, loaded:false};
}

const planets = [
  createPlanet({x:0,name:"🌍 Earth",desc:"Our home",tex:"https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/earth_atmos_2048.jpg",color:0x2266ff}),
  createPlanet({x:80,name:"🔴 Mars",desc:"The red planet",tex:"https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/mars_1k_color.jpg",color:0xff3300}),
  createPlanet({x:160,name:"🪐 Jupiter",desc:"Gas giant",tex:"https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/jupiter.jpg",color:0xffaa66})
];

// NAV DOTS
const nav = document.getElementById("nav");
planets.forEach(()=> {
  const d=document.createElement("div");
  d.className="dot";
  nav.appendChild(d);
});

// SCROLL
let target=0,current=0;

window.addEventListener("wheel", e=>{
  target += e.deltaY * 0.15;
});

// TOUCH
let lastY=0;
window.addEventListener("touchstart", e=>{
  lastY = e.touches[0].clientY;
});
window.addEventListener("touchmove", e=>{
  let delta = lastY - e.touches[0].clientY;
  target += delta * 0.1;
  lastY = e.touches[0].clientY;
});

// ANIMATE
function animate(){
  requestAnimationFrame(animate);

  current += (target-current)*0.05;
  camera.position.x = current;

  planets.forEach((p,i)=>{
    p.mesh.rotation.y += 0.002;

    // LAZY LOAD
    if(!p.loaded && Math.abs(camera.position.x - p.x) < 50){
      loader.load(p.tex, tex=>{
        p.mesh.material.map = tex;
        p.mesh.material.needsUpdate = true;
      });
      p.loaded = true;
    }
  });

  // UI UPDATE
  let closest = planets.reduce((a,b)=>{
    return Math.abs(b.x-camera.position.x) <
           Math.abs(a.x-camera.position.x)?b:a;
  });

  document.getElementById("name").innerText = closest.name;
  document.getElementById("desc").innerText = closest.desc;

  // NAV UPDATE
  document.querySelectorAll(".dot").forEach((d,i)=>{
    d.classList.toggle("active", planets[i]===closest);
  });

  renderer.render(scene,camera);
}
animate();

// LOADER
setTimeout(()=>{
  document.getElementById("loader").style.display="none";
},1500);

// RESIZE
window.addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
