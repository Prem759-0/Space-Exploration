<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Space Pro Max</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  color: white;
  font-family: sans-serif;
}

#ui {
  position: fixed;
  top: 20px;
  left: 20px;
  z-index: 10;
}

.info {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  padding: 15px;
  border-radius: 10px;
  max-width: 300px;
}
</style>
</head>

<body>

<div id="ui">
  <div class="info">
    <h2 id="planetName">🌍 Earth</h2>
    <p id="planetDesc">Drag to rotate. Scroll to travel.</p>
  </div>
</div>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js";
import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/controls/OrbitControls.js";

// SCENE
const scene = new THREE.Scene();

// CAMERA
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 5;

// RENDERER
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
const light = new THREE.PointLight(0xffffff, 2);
light.position.set(5,5,5);
scene.add(light);

// STARFIELD
const starsGeometry = new THREE.BufferGeometry();
const starCount = 2000;
const positions = [];

for (let i = 0; i < starCount; i++) {
  positions.push(
    (Math.random() - 0.5) * 200,
    (Math.random() - 0.5) * 200,
    (Math.random() - 0.5) * 200
  );
}

starsGeometry.setAttribute("position", new THREE.Float32BufferAttribute(positions, 3));

const starsMaterial = new THREE.PointsMaterial({color: 0xffffff});
const stars = new THREE.Points(starsGeometry, starsMaterial);
scene.add(stars);

// TEXTURES
const loader = new THREE.TextureLoader();

const textures = {
  earth: loader.load("https://threejs.org/examples/textures/earth_atmos_2048.jpg"),
  mars: loader.load("https://threejs.org/examples/textures/mars_1k_color.jpg"),
  jupiter: loader.load("https://threejs.org/examples/textures/jupiter.jpg")
};

// PLANET
let currentPlanet;

function createPlanet(texture) {
  if (currentPlanet) scene.remove(currentPlanet);

  const geometry = new THREE.SphereGeometry(1, 64, 64);
  const material = new THREE.MeshStandardMaterial({map: texture});
  const mesh = new THREE.Mesh(geometry, material);

  scene.add(mesh);
  currentPlanet = mesh;
}

// INITIAL PLANET
createPlanet(textures.earth);

// CONTROLS
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableZoom = false;

// SCROLL PLANET CHANGE
const planetData = [
  {name:"🌍 Earth", desc:"Our home planet", tex:textures.earth},
  {name:"🔴 Mars", desc:"The red planet", tex:textures.mars},
  {name:"🪐 Jupiter", desc:"Gas giant", tex:textures.jupiter}
];

let index = 0;

window.addEventListener("wheel", (e)=>{
  if (e.deltaY > 0) {
    index = (index + 1) % planetData.length;
  } else {
    index = (index - 1 + planetData.length) % planetData.length;
  }

  createPlanet(planetData[index].tex);

  document.getElementById("planetName").innerText = planetData[index].name;
  document.getElementById("planetDesc").innerText = planetData[index].desc;
});

// ANIMATE
function animate() {
  requestAnimationFrame(animate);

  if (currentPlanet) {
    currentPlanet.rotation.y += 0.002;
  }

  stars.rotation.y += 0.0005;

  renderer.render(scene, camera);
}

animate();

// RESPONSIVE
window.addEventListener("resize", ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
