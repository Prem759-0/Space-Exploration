<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Journey V2</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: sans-serif;
  overflow-x: hidden;
}

/* STARFIELD */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -2;
}

/* WARP EFFECT */
.warp {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, transparent, black);
  opacity: 0;
  z-index: 10;
  pointer-events: none;
}

section {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: space-around;
  padding: 50px;
}

.center {
  flex-direction: column;
  text-align: center;
}

/* PLANETS */
.planet {
  width: 250px;
  height: 250px;
  border-radius: 50%;
  transition: transform 0.2s;
}

.sun {
  width: 350px;
  height: 350px;
  background: radial-gradient(circle, #ffcc00, #ff3300);
  box-shadow: 0 0 100px orange;
}

/* EARTH */
.earth {
  background: url('https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg');
  background-size: cover;
  animation: spin 20s linear infinite;
}

/* SATURN */
.saturn {
  background: radial-gradient(circle, #d9b38c, #8c6239);
  position: relative;
}

.saturn::after {
  content: '';
  position: absolute;
  width: 400px;
  height: 100px;
  border-radius: 50%;
  border: 3px solid rgba(255,255,255,0.3);
  top: 80px;
  left: -75px;
  transform: rotate(20deg);
}

/* ORBIT */
.orbit {
  position: absolute;
  width: 400px;
  height: 400px;
  border: 1px dashed rgba(255,255,255,0.1);
  border-radius: 50%;
  animation: rotateOrbit 20s linear infinite;
}

/* INFO */
.info {
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 15px;
}

/* ANIMATIONS */
@keyframes spin {
  from { background-position: 0 0; }
  to { background-position: 1000px 0; }
}

@keyframes rotateOrbit {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="warp"></div>
<canvas id="stars"></canvas>

<section class="center">
  <h1>🌌 Space Journey</h1>
  <p>Scroll to travel through the universe</p>
</section>

<section>
  <div class="planet sun"></div>
  <div class="info">
    <h2>☀️ Sun</h2>
    <p>Massive star at the center of our solar system.</p>
  </div>
</section>

<section>
  <div style="position:relative;">
    <div class="orbit"></div>
    <div class="planet earth"></div>
  </div>
  <div class="info">
    <h2>🌍 Earth</h2>
    <p>Our home planet with orbit animation.</p>
  </div>
</section>

<section>
  <div class="planet saturn"></div>
  <div class="info">
    <h2>🪐 Saturn</h2>
    <p>Famous for its beautiful ring system.</p>
  </div>
</section>

<script>
// ⭐ STARFIELD DEPTH
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for (let i = 0; i < 800; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    z: Math.random() * 2
  });
}

function drawStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  stars.forEach(star => {
    ctx.fillStyle = "white";
    ctx.fillRect(star.x, star.y, star.z, star.z);

    star.y += star.z;

    if (star.y > canvas.height) star.y = 0;
  });

  requestAnimationFrame(drawStars);
}
drawStars();

// 🖱️ MOUSE PARALLAX
document.addEventListener("mousemove", e => {
  let x = (e.clientX / window.innerWidth - 0.5) * 30;
  let y = (e.clientY / window.innerHeight - 0.5) * 30;

  document.querySelectorAll(".planet").forEach(p => {
    p.style.transform = `translate(${x}px, ${y}px)`;
  });
});

// 🚀 WARP EFFECT ON SCROLL
let warp = document.querySelector(".warp");

ScrollTrigger.create({
  start: 0,
  end: "max",
  onUpdate: self => {
    if (self.direction === 1 && self.progress % 0.2 < 0.01) {
      gsap.fromTo(warp, {opacity: 0}, {opacity: 1, duration: 0.2, yoyo: true, repeat: 1});
    }
  }
});

// 🔍 ZOOM EFFECT
gsap.utils.toArray(".planet").forEach(planet => {
  gsap.from(planet, {
    scrollTrigger: {
      trigger: planet,
      start: "top 80%",
    },
    scale: 0.3,
    opacity: 0,
    duration: 1.5
  });
});
</script>

</body>
</html>
