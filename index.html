<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinematic Space</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:sans-serif; }

/* UI */
#ui {
  position:fixed;
  top:20px;
  left:20px;
  z-index:10;
}
.card {
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
  padding:15px;
  border-radius:10px;
  width:260px;
  color:white;
}
</style>
</head>

<body>

<div id="ui">
  <div class="card">
    <h2 id="name">🌌 Space</h2>
    <p id="desc">Scroll to begin journey</p>
  </div>
</div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js";

// SCENE
const scene = new THREE.Scene();

// CAMERA
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 3000);
camera.position.set(0,0,10);

// RENDERER
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
const light = new THREE.PointLight(0xffffff,2);
light.position.set(50,50,50);
scene.add(light);

// STARFIELD
const starGeo = new THREE.BufferGeometry();
let starPos=[];
for(let i=0;i<6000;i++){
  starPos.push((Math.random()-0.5)*4000);
  starPos.push((Math.random()-0.5)*4000);
  starPos.push((Math.random()-0.5)*4000);
}
starGeo.setAttribute("position", new THREE.Float32BufferAttribute(starPos,3));
const stars = new THREE.Points(starGeo,new THREE.PointsMaterial({color:0xffffff}));
scene.add(stars);

// TEXTURES
const loader = new THREE.TextureLoader();

// CREATE PLANET
function createPlanet(tex, x, name, desc){
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(3,64,64),
    new THREE.MeshStandardMaterial({map:loader.load(tex)})
  );
  mesh.position.x = x;
  scene.add(mesh);

  return {mesh,name,desc};
}

// PLANETS (PATH)
const planets = [
  createPlanet("https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/earth_atmos_2048.jpg", 0, "🌍 Earth","Our home"),
  createPlanet("https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/mars_1k_color.jpg", 80, "🔴 Mars","Red planet"),
  createPlanet("https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/jupiter.jpg", 160, "🪐 Jupiter","Gas giant"),
  createPlanet("https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/jupiter.jpg", 250, "🪐 Saturn","Ringed giant")
];

// SCROLL → CAMERA
let target = 0;
let current = 0;

window.addEventListener("wheel", e=>{
  target += e.deltaY * 0.2;
});

// TOUCH
window.addEventListener("touchmove", e=>{
  target += e.touches[0].clientY * 0.02;
});

// MOUSE PARALLAX
document.addEventListener("mousemove", e=>{
  camera.rotation.y = (e.clientX / innerWidth - 0.5) * 0.2;
  camera.rotation.x = (e.clientY / innerHeight - 0.5) * 0.2;
});

// ANIMATION
function animate(){
  requestAnimationFrame(animate);

  // SMOOTH CAMERA
  current += (target - current) * 0.05;
  camera.position.x = current;

  // ROTATE PLANETS
  planets.forEach(p=>{
    p.mesh.rotation.y += 0.003;
  });

  // FIND CLOSEST PLANET
  let closest = planets.reduce((a,b)=>{
    return Math.abs(b.mesh.position.x-camera.position.x) <
           Math.abs(a.mesh.position.x-camera.position.x)?b:a;
  });

  document.getElementById("name").innerText = closest.name;
  document.getElementById("desc").innerText = closest.desc;

  renderer.render(scene,camera);
}
animate();

// RESIZE
window.addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
