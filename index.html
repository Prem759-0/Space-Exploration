<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Solar System Journey — Beyond the Stars</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    :root {
      --glass-bg: rgba(10, 15, 40, 0.65);
      --glass-border: rgba(255, 255, 255, 0.15);
      --neon-blue: #4da8ff;
      --neon-cyan: #00e5ff;
      --text-primary: #e8ecf4;
      --text-secondary: #a0b4cc;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter','Space Grotesk',sans-serif;
      background: #000010;
      color: var(--text-primary);
      overflow-x: hidden;
      scrollbar-width: thin;
      scrollbar-color: rgba(100,140,255,0.4) transparent;
    }
    ::-webkit-scrollbar { width:6px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:rgba(100,140,255,0.4); border-radius:3px; }

    #canvas-container {
      position: fixed; top:0; left:0; width:100vw; height:100vh; z-index:0;
    }
    #warp-overlay {
      position:fixed; top:0; left:0; width:100vw; height:100vh; pointer-events:none; z-index:999;
      opacity:0; background:radial-gradient(ellipse at center, transparent 30%, rgba(0,0,20,0.6) 60%, rgba(0,0,10,0.95) 100%);
      transition:opacity 0.4s;
    }
    #warp-overlay.active { opacity:1; }
    #warp-streaks {
      position:fixed; top:0; left:0; width:100vw; height:100vh; pointer-events:none; z-index:998; opacity:0;
      transition:opacity 0.3s;
    }
    #warp-streaks.active { opacity:1; }

    #sound-toggle {
      position:fixed; top:24px; right:24px; z-index:1000;
      background:var(--glass-bg); border:1px solid var(--glass-border); color:white;
      padding:10px 14px; border-radius:30px; cursor:pointer; backdrop-filter:blur(20px); font-weight:500;
    }
    #depth-meter {
      position:fixed; right:20px; top:10%; height:80vh; width:30px; z-index:1000;
      display:flex; flex-direction:column; align-items:center; background:rgba(5,10,30,0.4);
      border-radius:20px; border:1px solid rgba(255,255,255,0.1); backdrop-filter:blur(10px);
    }
    #depth-fill { width:4px; flex:1; background:rgba(255,255,255,0.1); border-radius:2px; margin:10px 0; position:relative; }
    #depth-indicator {
      width:10px; height:10px; border-radius:50%; background:var(--neon-cyan);
      position:absolute; left:-3px; top:0%; box-shadow:0 0 15px var(--neon-cyan); transition:top 0.2s;
    }
    #au-label { font-size:10px; color:var(--text-secondary); margin-top:4px; }
    #nav-dots {
      position:fixed; left:20px; top:50%; transform:translateY(-50%); z-index:1000; display:flex; flex-direction:column; gap:12px;
    }
    .nav-dot {
      width:10px; height:10px; border-radius:50%; background:rgba(255,255,255,0.35); cursor:pointer;
      transition:0.35s; border:1px solid transparent;
    }
    .nav-dot:hover,.nav-dot.active { background:var(--neon-blue); box-shadow:0 0 16px rgba(77,168,255,0.7); transform:scale(1.4); }

    .info-card-overlay {
      position:fixed; bottom:80px; left:50%; transform:translateX(-50%); z-index:100;
      background:var(--glass-bg); border:1px solid var(--glass-border); border-radius:20px;
      padding:30px 40px; backdrop-filter:blur(24px); text-align:center; max-width:500px; width:90%;
      opacity:0; transition:opacity 0.5s; pointer-events:none;
    }
    .info-card-overlay.active { opacity:1; }
    .planet-modal {
      position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:2000;
      display:flex; align-items:center; justify-content:center; backdrop-filter:blur(12px);
      background:rgba(0,0,0,0.8); opacity:0; pointer-events:none; transition:opacity 0.35s;
    }
    .planet-modal.active { opacity:1; pointer-events:auto; }
    .modal-content {
      background:rgba(10,15,40,0.9); border:1px solid rgba(255,255,255,0.2); border-radius:24px;
      padding:48px 40px; max-width:580px; width:90%; text-align:center;
    }
    .close-modal { position:absolute; top:15px; right:20px; background:none; border:none; color:white; font-size:30px; cursor:pointer; }

    #compare-btn {
      position:fixed; bottom:30px; left:30px; z-index:1000;
      background:var(--glass-bg); backdrop-filter:blur(20px); border:1px solid var(--glass-border);
      padding:12px 24px; border-radius:40px; color:white; cursor:pointer;
    }
    .compare-overlay {
      position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.85);
      backdrop-filter:blur(10px); z-index:2001; display:flex; flex-direction:column; align-items:center;
      justify-content:center; opacity:0; pointer-events:none; transition:0.4s;
    }
    .compare-overlay.active { opacity:1; pointer-events:auto; }
    .compare-bar { display:flex; align-items:flex-end; gap:10px; margin-top:30px; }
    .compare-planet { width:40px; background:rgba(255,255,255,0.7); border-radius:4px 4px 0 0; text-align:center; font-size:12px; padding-top:5px; }

    @media (max-width:768px) {
      #depth-meter { right:5px; width:20px; }
      .info-card-overlay { bottom:40px; }
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <canvas id="warp-streaks"></canvas>
  <div id="warp-overlay"></div>

  <button id="sound-toggle">🔇 Sound Off</button>

  <div id="depth-meter">
    <span style="color:white;font-size:10px;">AU</span>
    <div id="depth-fill"><div id="depth-indicator"></div></div>
    <span id="au-label">0.0</span>
  </div>

  <nav id="nav-dots">
    <span class="nav-dot" data-target="sun"></span>
    <span class="nav-dot" data-target="mercury"></span>
    <span class="nav-dot" data-target="venus"></span>
    <span class="nav-dot" data-target="earth"></span>
    <span class="nav-dot" data-target="mars"></span>
    <span class="nav-dot" data-target="jupiter"></span>
    <span class="nav-dot" data-target="saturn"></span>
    <span class="nav-dot" data-target="uranus"></span>
    <span class="nav-dot" data-target="neptune"></span>
  </nav>

  <div class="info-card-overlay" id="info-card"></div>

  <button id="compare-btn">🪐 Compare Sizes</button>

  <!-- Modal -->
  <div class="planet-modal" id="planet-modal">
    <div class="modal-content" id="modal-content"></div>
    <button class="close-modal" id="close-modal">&times;</button>
  </div>
  <div class="compare-overlay" id="compare-overlay">
    <h2 style="color:white;">Planet Size Comparison</h2>
    <div class="compare-bar" id="compare-bar"></div>
    <button style="margin-top:30px; padding:10px 30px; border-radius:30px; background:white; color:black; border:none; cursor:pointer;" id="close-compare">Close</button>
  </div>

  <div id="nasa-panel" style="position:fixed; bottom:30px; right:30px; z-index:1000; background:var(--glass-bg); backdrop-filter:blur(20px); border:1px solid var(--glass-border); padding:12px 24px; border-radius:20px; color:white; font-size:13px; max-width:280px; display:none;"></div>

  <div id="scroll-spacer" style="height:20000px; position:relative; z-index:0;"></div>

  <script>
    (() => {
      // ─────────────────────────────
      // THREE.JS SOLAR SYSTEM SCENE
      // ─────────────────────────────
      const container = document.getElementById('canvas-container');
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000);
      camera.position.set(0, 5, -30);
      camera.lookAt(0, 0, 0);

      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      container.appendChild(renderer.domElement);

      // ── Galaxy Background ──
      const galaxyPoints = new THREE.BufferGeometry();
      const galaxyCount = 3000;
      const galaxyPositions = new Float32Array(galaxyCount * 3);
      const galaxyColors = new Float32Array(galaxyCount * 3);
      for (let i = 0; i < galaxyCount; i++) {
        const i3 = i * 3;
        const radius = 300 + Math.random() * 500;
        const angle = Math.random() * Math.PI * 2;
        const x = Math.cos(angle) * radius * (0.8 + Math.random() * 0.4);
        const z = Math.sin(angle) * radius * (0.8 + Math.random() * 0.4);
        const y = (Math.random() - 0.5) * 200;
        galaxyPositions[i3] = x;
        galaxyPositions[i3+1] = y;
        galaxyPositions[i3+2] = z;
        const c = new THREE.Color(`hsl(${200 + Math.random() * 60}, 70%, ${50 + Math.random() * 40}%)`);
        galaxyColors[i3] = c.r;
        galaxyColors[i3+1] = c.g;
        galaxyColors[i3+2] = c.b;
      }
      galaxyPoints.setAttribute('position', new THREE.BufferAttribute(galaxyPositions, 3));
      galaxyPoints.setAttribute('color', new THREE.BufferAttribute(galaxyColors, 3));
      const galaxyMat = new THREE.PointsMaterial({ size: 1.2, vertexColors: true, blending: THREE.AdditiveBlending, depthWrite: false });
      const galaxy = new THREE.Points(galaxyPoints, galaxyMat);
      scene.add(galaxy);

      // ── Sun (with glow) ──
      const sunGeom = new THREE.SphereGeometry(3, 64, 64);
      const sunMat = new THREE.MeshBasicMaterial({ color: 0xff8800 });
      const sun = new THREE.Mesh(sunGeom, sunMat);
      sun.position.set(0, 0, 0);
      scene.add(sun);
      const sunGlowMat = new THREE.ShaderMaterial({
        uniforms: {},
        vertexShader: `varying vec3 vNormal; void main() { vNormal = normalize(normalMatrix * normal); gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }`,
        fragmentShader: `varying vec3 vNormal; void main() { float intensity = pow(0.7 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 2.0); gl_FragColor = vec4(1.0, 0.6, 0.2, 1.0) * intensity; }`,
        side: THREE.BackSide, blending: THREE.AdditiveBlending, transparent: true
      });
      const sunGlow = new THREE.Mesh(new THREE.SphereGeometry(3.6, 64, 64), sunGlowMat);
      sun.add(sunGlow);

      // ── Planet data: name, distance (Z), size, color, rings, moons ──
      const planets = [
        { name:'mercury', dist:8, size:0.4, color:0xb0a090 },
        { name:'venus', dist:14, size:0.9, color:0xe8c890 },
        { name:'earth', dist:20, size:1.0, color:0x4da8ff, hasMoon:true },
        { name:'mars', dist:27, size:0.55, color:0xe07040 },
        { name:'jupiter', dist:37, size:3.5, color:0xd4b896, hasStorm:true },
        { name:'saturn', dist:48, size:3.0, color:0xe8d5a3, hasRings:true },
        { name:'uranus', dist:58, size:2.2, color:0x7ec8e3 },
        { name:'neptune', dist:67, size:2.1, color:0x6080ff }
      ];

      const planetMeshes = [];
      const orbitLines = [];

      planets.forEach((p, idx) => {
        const geom = new THREE.SphereGeometry(p.size, 48, 48);
        const mat = new THREE.MeshStandardMaterial({ color: p.color, roughness: 0.7 });
        const mesh = new THREE.Mesh(geom, mat);
        mesh.position.set(0, 0, p.dist);
        mesh.userData = { name: p.name, distance: p.dist };
        scene.add(mesh);
        planetMeshes.push(mesh);

        // Orbit ring
        const points = [];
        for (let i = 0; i <= 128; i++) {
          const angle = (i / 128) * Math.PI * 2;
          points.push(new THREE.Vector3(Math.cos(angle) * p.dist, 0, Math.sin(angle) * p.dist));
        }
        const orbitGeom = new THREE.BufferGeometry().setFromPoints(points);
        const orbitLine = new THREE.Line(orbitGeom, new THREE.LineBasicMaterial({ color: 0x335577, transparent: true, opacity: 0.2 }));
        scene.add(orbitLine);
        orbitLines.push(orbitLine);

        // Rings for Saturn
        if (p.hasRings) {
          const ringGeom = new THREE.RingGeometry(p.size*1.4, p.size*2.2, 64);
          const ringMat = new THREE.MeshBasicMaterial({ color: 0xc8b07a, side: THREE.DoubleSide, transparent: true, opacity: 0.6 });
          const ring = new THREE.Mesh(ringGeom, ringMat);
          ring.rotation.x = Math.PI / 2;
          mesh.add(ring);
        }
        // Jupiter storm (red spot)
        if (p.hasStorm) {
          const spotGeom = new THREE.SphereGeometry(p.size*0.25, 16, 16);
          const spotMat = new THREE.MeshBasicMaterial({ color: 0xcc5555 });
          const spot = new THREE.Mesh(spotGeom, spotMat);
          spot.position.set(p.size*0.7, p.size*0.15, 0);
          mesh.add(spot);
        }
        // Moon for Earth
        if (p.hasMoon) {
          const moonGeom = new THREE.SphereGeometry(0.25, 16, 16);
          const moonMat = new THREE.MeshStandardMaterial({ color: 0xcccccc });
          const moon = new THREE.Mesh(moonGeom, moonMat);
          moon.position.set(1.5, 0, 0);
          mesh.add(moon);
          mesh.userData.moon = moon;
        }
      });

      // Lighting
      scene.add(new THREE.AmbientLight(0x222244));
      const pointLight = new THREE.PointLight(0xffeedd, 2, 100);
      pointLight.position.set(0, 0, 0);
      scene.add(pointLight);

      // ──────────── SCROLL CAMERA MOVEMENT ────────────
      const spacer = document.getElementById('scroll-spacer');
      const scrollHeight = spacer.offsetHeight;
      const maxDistance = 67; // Neptune Z
      const startZ = -10;
      const totalDistance = maxDistance - startZ;
      let targetCameraZ = startZ;

      function updateCameraFromScroll() {
        const scrollY = window.scrollY;
        const progress = Math.min(scrollY / (scrollHeight - window.innerHeight), 1.0);
        targetCameraZ = startZ + progress * totalDistance;
      }
      window.addEventListener('scroll', updateCameraFromScroll);

      // ──────────── WARP STREAKS ────────────
      const warpCanvas = document.getElementById('warp-streaks');
      const warpCtx = warpCanvas.getContext('2d');
      warpCanvas.width = window.innerWidth;
      warpCanvas.height = window.innerHeight;
      let warpActive = false, warpIntensity = 0;
      const streaks = Array.from({length:100}, () => ({
        x: Math.random()*warpCanvas.width, y: Math.random()*warpCanvas.height,
        len: Math.random()*180+60, speed: Math.random()*18+8, opacity: Math.random()*0.7+0.3
      }));
      function drawWarp() {
        warpCtx.clearRect(0,0,warpCanvas.width,warpCanvas.height);
        if(!warpActive && warpIntensity<=0.01) return;
        warpCtx.globalCompositeOperation='lighter';
        streaks.forEach(s=>{
          s.y -= s.speed*warpIntensity;
          if(s.y<-s.len){ s.y=warpCanvas.height+s.len; s.x=Math.random()*warpCanvas.width; }
          const g=warpCtx.createLinearGradient(s.x,s.y,s.x,s.y+s.len);
          g.addColorStop(0,`rgba(180,210,255,${s.opacity*warpIntensity})`);
          g.addColorStop(1,'rgba(100,150,255,0)');
          warpCtx.strokeStyle=g; warpCtx.lineWidth=1.5;
          warpCtx.beginPath(); warpCtx.moveTo(s.x,s.y); warpCtx.lineTo(s.x,s.y+s.len); warpCtx.stroke();
        });
        warpCtx.globalCompositeOperation='source-over';
      }
      function triggerWarp(ms=500){
        warpActive=true; warpIntensity=1;
        document.getElementById('warp-overlay').classList.add('active');
        document.getElementById('warp-streaks').classList.add('active');
        setTimeout(()=>{ warpActive=false; warpIntensity=0; document.getElementById('warp-overlay').classList.remove('active'); document.getElementById('warp-streaks').classList.remove('active'); },ms);
      }
      let lastScroll=0;
      window.addEventListener('scroll',()=>{ const speed=Math.abs(window.scrollY-lastScroll); if(speed>60&&!warpActive) triggerWarp(300); lastScroll=window.scrollY; });

      // ──────────── AUDIO ────────────
      let audioCtx=null,soundOn=false,ambientOsc=null,ambientGain=null;
      function initAudio(){ if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)(); }
      function startAmbient(){
        if(!audioCtx) initAudio(); if(ambientOsc) return;
        ambientGain=audioCtx.createGain(); ambientGain.gain.setValueAtTime(0.03,audioCtx.currentTime);
        ambientOsc=audioCtx.createOscillator(); ambientOsc.type='sine'; ambientOsc.frequency.value=55;
        const lfo=audioCtx.createOscillator(); const lfoGain=audioCtx.createGain();
        lfo.frequency.value=0.1; lfoGain.gain.value=8; lfo.connect(lfoGain); lfoGain.connect(ambientOsc.frequency); lfo.start();
        ambientOsc.connect(ambientGain); ambientGain.connect(audioCtx.destination); ambientOsc.start();
      }
      function stopAmbient(){ if(ambientOsc){ ambientOsc.stop(); ambientOsc.disconnect(); ambientOsc=null; } if(ambientGain){ ambientGain.disconnect(); ambientGain=null; } }
      document.getElementById('sound-toggle').addEventListener('click',()=>{
        initAudio();
        if(soundOn){ stopAmbient(); soundOn=false; document.getElementById('sound-toggle').textContent='🔇 Sound Off'; }
        else{ startAmbient(); soundOn=true; document.getElementById('sound-toggle').textContent='🔊 Sound On'; }
      });
      function playClick(){ if(!audioCtx||!soundOn) return; const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.type='sine'; o.frequency.value=800; g.gain.setValueAtTime(0.1,audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.1); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+0.1); }

      // ──────────── UI: DEPTH METER ────────────
      const auLabel=document.getElementById('au-label'), depthIndicator=document.getElementById('depth-indicator');
      function updateDepthMeter(){
        const progress=Math.min(window.scrollY/(scrollHeight-window.innerHeight),1);
        auLabel.textContent=(progress*30.05).toFixed(1)+' AU';
        depthIndicator.style.top=progress*100+'%';
      }
      window.addEventListener('scroll',updateDepthMeter);

      // ──────────── NAV DOTS ────────────
      const dots=document.querySelectorAll('.nav-dot');
      function updateActiveDotByCamera(){
        const camZ=camera.position.z;
        let active='sun';
        for(let p of planets){ if(camZ>=p.dist-1.5&&camZ<p.dist+2){ active=p.name; break; } }
        dots.forEach(d=>d.classList.toggle('active', d.dataset.target===active));
      }
      dots.forEach(d=>{ d.addEventListener('click',()=>{
        const target=d.dataset.target;
        let targetZ=0;
        if(target==='sun') targetZ=0;
        else{ const p=planets.find(pl=>pl.name===target); if(p) targetZ=p.dist; }
        const scrollTarget = ((targetZ-startZ)/totalDistance)*(scrollHeight-window.innerHeight);
        window.scrollTo({top:scrollTarget, behavior:'smooth'});
        triggerWarp(400); playClick();
      });});

      // ──────────── INFO CARD OVERLAY ────────────
      const infoCard=document.getElementById('info-card');
      function showPlanetInfo(name){
        const facts={ sun:'☀️ Sun · 1.39M km · 5,500°C', mercury:'Mercury · 4,880 km · no atmosphere', venus:'Venus · 12,104 km · 465°C', earth:'🌍 Earth · 12,742 km · our home', mars:'Mars · 6,779 km · red desert', jupiter:'Jupiter · 139,820 km · great red spot', saturn:'🪐 Saturn · 116,460 km · magnificent rings', uranus:'Uranus · 50,724 km · sideways ice giant', neptune:'Neptune · 49,244 km · windiest planet' };
        infoCard.textContent=facts[name]||name;
        infoCard.classList.add('active');
        setTimeout(()=>infoCard.classList.remove('active'),4000);
      }
      let lastPlanetShown='';
      function checkPlanetProximity(){
        const camZ=camera.position.z;
        for(let p of planets){
          if(Math.abs(camZ-p.dist)<1.2 && lastPlanetShown!==p.name){
            showPlanetInfo(p.name);
            lastPlanetShown=p.name;
            break;
          }
        }
      }

      // ──────────── MODAL ────────────
      const modal=document.getElementById('planet-modal'), modalContent=document.getElementById('modal-content');
      const details={ sun:'The Sun is a 4.6-billion-year-old G-type star.', mercury:'Smallest planet, orbits in 88 days.', venus:'Hottest planet, spins backwards.', earth:'Only planet with known life.', mars:'Red planet with tallest volcano.', jupiter:'Largest planet, storm for 350 years.', saturn:'Ringed giant, least dense.', uranus:'Sideways ice giant.', neptune:'Windiest planet.' };
      renderer.domElement.addEventListener('click',(event)=>{
        const mouse=new THREE.Vector2((event.clientX/window.innerWidth)*2-1,-(event.clientY/window.innerHeight)*2+1);
        const raycaster=new THREE.Raycaster(); raycaster.setFromCamera(mouse,camera);
        const intersects=raycaster.intersectObjects(planetMeshes);
        if(intersects.length>0){
          const obj=intersects[0].object;
          const name=obj.userData.name;
          modalContent.innerHTML=`<h2>${name.toUpperCase()}</h2><p>${details[name]}</p>`;
          modal.classList.add('active'); playClick();
        }
      });
      document.getElementById('close-modal').addEventListener('click',()=>modal.classList.remove('active'));
      modal.addEventListener('click',(e)=>{ if(e.target===modal) modal.classList.remove('active'); });

      // ──────────── COMPARE OVERLAY ────────────
      const compareOverlay=document.getElementById('compare-overlay');
      document.getElementById('compare-btn').addEventListener('click',()=>{
        const sizes=[{n:'Sun',d:1390000},{n:'Jupiter',d:139820},{n:'Saturn',d:116460},{n:'Uranus',d:50724},{n:'Neptune',d:49244},{n:'Earth',d:12742},{n:'Venus',d:12104},{n:'Mars',d:6779},{n:'Mercury',d:4880}];
        const max=1390000;
        document.getElementById('compare-bar').innerHTML=sizes.map(s=>`<div class="compare-planet" style="height:${(s.d/max)*300}px" title="${s.n} ${s.d}km">${s.n}</div>`).join('');
        compareOverlay.classList.add('active'); playClick();
      });
      document.getElementById('close-compare').addEventListener('click',()=>compareOverlay.classList.remove('active'));

      // NASA API
      fetch('https://api.nasa.gov/planetary/apod?api_key=DEMO_KEY').then(r=>r.json()).then(data=>{
        const panel=document.getElementById('nasa-panel'); panel.textContent='🌠 '+data.title; panel.style.display='block';
      }).catch(()=>{ document.getElementById('nasa-panel').style.display='block'; });

      // ──────────── ANIMATION LOOP ────────────
      function animate(){
        requestAnimationFrame(animate);
        // Smooth camera
        camera.position.z += (targetCameraZ - camera.position.z) * 0.1;
        // Rotate planets
        planetMeshes.forEach(m=>m.rotation.y+=0.005);
        // Moon orbit
        const earth=planetMeshes.find(m=>m.userData.name==='earth');
        if(earth&&earth.userData.moon){
          earth.userData.moon.position.x=Math.cos(Date.now()*0.002)*1.5;
          earth.userData.moon.position.z=Math.sin(Date.now()*0.002)*1.5;
        }
        // Update UI
        updateActiveDotByCamera();
        checkPlanetProximity();
        updateDepthMeter();
        // Warp
        if(warpActive||warpIntensity>0.001){ drawWarp(); if(!warpActive&&warpIntensity>0) warpIntensity*=0.92; }
        renderer.render(scene,camera);
      }
      animate();

      window.addEventListener('resize',()=>{
        renderer.setSize(window.innerWidth,window.innerHeight);
        camera.aspect=window.innerWidth/window.innerHeight;
        camera.updateProjectionMatrix();
        warpCanvas.width=window.innerWidth; warpCanvas.height=window.innerHeight;
      });
    })();
  </script>
</body>
</html>
