<!-- ADD THIS BELOW YOUR EXISTING BODY CONTENT -->

<!-- MODAL -->
<div id="modal" style="
position:fixed;
top:0; left:0;
width:100%; height:100%;
background:rgba(0,0,0,0.8);
display:none;
align-items:center;
justify-content:center;
z-index:20;
">
  <div style="
  width:80%;
  max-width:600px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);
  padding:20px;
  border-radius:15px;
  text-align:center;
  position:relative;
  ">
    <button onclick="closeModal()" style="
    position:absolute;
    top:10px; right:10px;
    background:none; color:white; border:none;
    font-size:20px; cursor:pointer;">✖</button>

    <h2 id="modalTitle"></h2>
    <canvas id="planet3d" width="300" height="300"></canvas>
    <p id="modalText"></p>

    <!-- SIZE BAR -->
    <div id="sizeBar" style="margin-top:15px;"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160/build/three.min.js"></script>

<script>
// 🌍 PLANET DATA
const planetInfo = {
  Earth: {text:"Our home planet with life.", size:1},
  Jupiter: {text:"Largest planet in solar system.", size:11},
  Mars: {text:"Red planet, future missions.", size:0.5},
  Saturn: {text:"Ringed giant.", size:9}
};

// CLICK EVENT
document.querySelectorAll(".planet").forEach(p=>{
  p.addEventListener("click", ()=>{
    let name = p.classList[1]?.charAt(0).toUpperCase()+p.classList[1]?.slice(1);

    if(!planetInfo[name]) return;

    openModal(name);
  });
});

function openModal(name){
  document.getElementById("modal").style.display="flex";
  document.getElementById("modalTitle").innerText=name;
  document.getElementById("modalText").innerText=planetInfo[name].text;

  // SIZE BAR
  let size = planetInfo[name].size * 20;
  document.getElementById("sizeBar").innerHTML =
    `<div style="background:white;height:10px;width:${size}%"></div>`;

  init3D();
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

// 🌌 3D PLANET
function init3D(){
  const canvas = document.getElementById("planet3d");

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75,1,0.1,1000);
  camera.position.z=3;

  const renderer = new THREE.WebGLRenderer({canvas,alpha:true});
  renderer.setSize(300,300);

  const light = new THREE.PointLight(0xffffff,1.5);
  light.position.set(5,5,5);
  scene.add(light);

  const geo = new THREE.SphereGeometry(1,32,32);
  const mat = new THREE.MeshStandardMaterial({color:0x3399ff});
  const mesh = new THREE.Mesh(geo,mat);
  scene.add(mesh);

  function animate(){
    requestAnimationFrame(animate);
    mesh.rotation.y += 0.01;
    renderer.render(scene,camera);
  }
  animate();
}

// 🌙 MOON + SATELLITE (EARTH)
const earth = document.querySelector(".earth");

if(earth){
  let moon = document.createElement("div");
  moon.style = `
    position:absolute;
    width:40px;height:40px;
    background:white;
    border-radius:50%;
    top:110px; left:110px;
    animation:moonOrbit 6s linear infinite;
  `;
  earth.appendChild(moon);

  let sat = document.createElement("div");
  sat.style = `
    position:absolute;
    width:10px;height:10px;
    background:cyan;
    border-radius:50%;
    top:120px; left:120px;
    animation:moonOrbit 3s linear infinite;
  `;
  earth.appendChild(sat);
}

// ORBIT KEYFRAMES
const style = document.createElement("style");
style.innerHTML = `
@keyframes moonOrbit {
  from { transform: rotate(0deg) translateX(80px) rotate(0deg); }
  to { transform: rotate(360deg) translateX(80px) rotate(-360deg); }
}`;
document.head.appendChild(style);

</script>
