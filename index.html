<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space SaaS Pro</title>

<style>
body { margin:0; font-family:sans-serif; background:black; color:white; overflow:hidden; }

/* LANDING */
.landing {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}
.btn {
  padding:12px 20px;
  background:white;
  color:black;
  border-radius:10px;
  cursor:pointer;
}

/* UI */
#ui {
  position:fixed;
  top:20px;
  left:20px;
  z-index:10;
}
.card {
  background:rgba(255,255,255,0.08);
  padding:15px;
  border-radius:10px;
  backdrop-filter:blur(10px);
}
</style>
</head>

<body>

<section class="landing">
  <h1>🚀 Space SaaS</h1>
  <p>Launch immersive 3D exploration</p>
  <div class="btn" onclick="start()">Enter Experience</div>
</section>

<div id="ui">
  <div class="card">
    <h2 id="name">Planet</h2>
    <p id="desc">Description</p>
  </div>
</div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js";

let started=false;

window.start = ()=>{
  document.querySelector(".landing").style.display="none";
  if(!started){ init(); started=true; }
};

function init(){

const scene = new THREE.Scene();

// CAMERA
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 2000);
camera.position.z=5;

// RENDERER
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// 🔥 LIGHT FIX (IMPORTANT)
const ambient = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambient);

const point = new THREE.PointLight(0xffffff, 1.5);
point.position.set(20,20,20);
scene.add(point);

// ⭐ STARFIELD
const starGeo = new THREE.BufferGeometry();
let pos=[];
for(let i=0;i<4000;i++){
  pos.push((Math.random()-0.5)*2000);
  pos.push((Math.random()-0.5)*2000);
  pos.push((Math.random()-0.5)*2000);
}
starGeo.setAttribute("position", new THREE.Float32BufferAttribute(pos,3));
const stars = new THREE.Points(starGeo,new THREE.PointsMaterial({color:0xffffff}));
scene.add(stars);

// 🌍 TEXTURES (MORE RELIABLE)
const loader = new THREE.TextureLoader();

function createPlanet(url, x, fallbackColor){
  const geo = new THREE.SphereGeometry(2,64,64);

  const texture = loader.load(
    url,
    ()=>{}, 
    undefined,
    ()=>{ console.log("Texture failed, using color"); }
  );

  const mat = new THREE.MeshStandardMaterial({
    map: texture,
    color: fallbackColor
  });

  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.x = x;
  scene.add(mesh);

  // 🌟 ATMOSPHERE GLOW
  const glow = new THREE.Mesh(
    new THREE.SphereGeometry(2.2,64,64),
    new THREE.MeshBasicMaterial({
      color:0x00aaff,
      transparent:true,
      opacity:0.15
    })
  );
  glow.position.x = x;
  scene.add(glow);

  return mesh;
}

// 🌍 PLANETS (FIXED)
const earth = createPlanet(
  "https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/earth_atmos_2048.jpg",
  0,
  0x2266ff
);

const mars = createPlanet(
  "https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/mars_1k_color.jpg",
  30,
  0xff3300
);

const jupiter = createPlanet(
  "https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/jupiter.jpg",
  60,
  0xffaa66
);

// DATA
const planets = [
  {mesh:earth,name:"🌍 Earth",desc:"Life planet"},
  {mesh:mars,name:"🔴 Mars",desc:"Future colony"},
  {mesh:jupiter,name:"🪐 Jupiter",desc:"Gas giant"}
];

// SCROLL SMOOTH
let target=0,current=0;
window.addEventListener("wheel", e=>{
  target += e.deltaY * 0.05;
});

// ANIMATE
function animate(){
  requestAnimationFrame(animate);

  current += (target-current)*0.05;
  camera.position.x = current;

  planets.forEach(p=> p.mesh.rotation.y += 0.003);

  let closest = planets.reduce((a,b)=>{
    return Math.abs(b.mesh.position.x-camera.position.x) <
           Math.abs(a.mesh.position.x-camera.position.x)?b:a;
  });

  document.getElementById("name").innerText=closest.name;
  document.getElementById("desc").innerText=closest.desc;

  renderer.render(scene,camera);
}
animate();

// RESIZE
window.addEventListener("resize", ()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

}
</script>

</body>
</html>
