<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Experience Pro</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:sans-serif; }

/* UI */
#ui {
  position:fixed;
  top:20px;
  left:20px;
  z-index:10;
  transition:opacity 0.4s ease;
}
.card {
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  padding:18px;
  border-radius:14px;
  width:260px;
  color:white;
  box-shadow:0 0 25px rgba(255,255,255,0.1);
}

/* LOADER */
#loader {
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:100;
  font-size:1.5rem;
  letter-spacing:2px;
}

/* PROGRESS BAR */
#progress {
  position:fixed;
  bottom:0;
  left:0;
  height:3px;
  background:white;
  width:0%;
  z-index:20;
  transition:width 0.2s;
}
</style>
</head>

<body>

<div id="loader">🌌 Loading Experience...</div>

<div id="ui">
  <div class="card">
    <h2 id="name">Space</h2>
    <p id="desc">Scroll to begin</p>
  </div>
</div>

<div id="progress"></div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js";

// SCENE
const scene = new THREE.Scene();

// CAMERA
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 3000);
camera.position.z = 10;

// RENDERER
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
document.body.appendChild(renderer.domElement);

// LIGHT
scene.add(new THREE.AmbientLight(0xffffff,0.6));
const light = new THREE.PointLight(0xffffff,1.5);
light.position.set(50,50,50);
scene.add(light);

// STARFIELD
const geo = new THREE.BufferGeometry();
let pos=[];
for(let i=0;i<2500;i++){
  pos.push((Math.random()-0.5)*3000);
  pos.push((Math.random()-0.5)*3000);
  pos.push((Math.random()-0.5)*3000);
}
geo.setAttribute("position", new THREE.Float32BufferAttribute(pos,3));
scene.add(new THREE.Points(geo,new THREE.PointsMaterial({color:0xffffff})));

// PLANETS
const loader = new THREE.TextureLoader();

function createPlanet(data){
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(2.5,32,32),
    new THREE.MeshStandardMaterial({color:data.color})
  );
  mesh.position.x = data.x;
  scene.add(mesh);
  return {...data, mesh, loaded:false};
}

const planets = [
  createPlanet({x:0,name:"🌍 Earth",desc:"Our home planet",tex:"https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/earth_atmos_2048.jpg",color:0x2266ff}),
  createPlanet({x:80,name:"🔴 Mars",desc:"The red planet",tex:"https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/mars_1k_color.jpg",color:0xff3300}),
  createPlanet({x:160,name:"🪐 Jupiter",desc:"Gas giant",tex:"https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/jupiter.jpg",color:0xffaa66})
];

// SCROLL
let target=0,current=0;

window.addEventListener("wheel", e=>{
  target += e.deltaY * 0.15;
});

// TOUCH
let lastY=0;
window.addEventListener("touchstart", e=>{
  lastY = e.touches[0].clientY;
});
window.addEventListener("touchmove", e=>{
  let delta = lastY - e.touches[0].clientY;
  target += delta * 0.1;
  lastY = e.touches[0].clientY;
});

// UI
const ui = document.getElementById("ui");
const progress = document.getElementById("progress");

// ANIMATION
function animate(){
  requestAnimationFrame(animate);

  current += (target-current)*0.05;
  camera.position.x = current;

  // PROGRESS BAR
  progress.style.width = Math.min(Math.max(current/200*100,0),100)+"%";

  planets.forEach(p=>{
    p.mesh.rotation.y += 0.002;

    // LAZY LOAD
    if(!p.loaded && Math.abs(camera.position.x - p.x) < 40){
      loader.load(p.tex, tex=>{
        p.mesh.material.map = tex;
        p.mesh.material.needsUpdate = true;
      });
      p.loaded = true;
    }
  });

  // FOCUS EFFECT
  let closest = planets.reduce((a,b)=>{
    return Math.abs(b.x-camera.position.x) <
           Math.abs(a.x-camera.position.x)?b:a;
  });

  let dist = Math.abs(closest.x - camera.position.x);

  // SLOW DOWN NEAR PLANET (cinematic feel)
  if(dist < 10){
    target += (closest.x - target) * 0.02;
  }

  // UI FADE
  ui.style.opacity = 0.2 + (1 - Math.min(dist/50,1));

  document.getElementById("name").innerText = closest.name;
  document.getElementById("desc").innerText = closest.desc;

  renderer.render(scene,camera);
}
animate();

// LOADER
setTimeout(()=>{
  document.getElementById("loader").style.display="none";
},1200);

// RESIZE
window.addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
